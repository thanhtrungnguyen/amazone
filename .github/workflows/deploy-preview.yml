# -------------------------------------------------------------------
# Vercel Preview Deployment
#
# Deploys a preview environment for every PR so reviewers can test
# changes in an isolated URL before merging.
#
# Required repository secrets:
#   VERCEL_TOKEN      - Personal access token from vercel.com/account/tokens
#   VERCEL_ORG_ID     - From .vercel/project.json or `vercel link`
#   VERCEL_PROJECT_ID - From .vercel/project.json or `vercel link`
# -------------------------------------------------------------------

name: Deploy Preview

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.15.1"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const body = [
              `### Preview Deployment`,
              ``,
              `| | |`,
              `|---|---|`,
              `| **Status** | Deployed |`,
              `| **URL** | [${deployUrl}](${deployUrl}) |`,
              `| **Commit** | \`${sha}\` |`,
              ``,
              `Built from commit ${context.payload.pull_request.head.sha}.`,
            ].join('\n');

            // Find and update an existing comment, or create a new one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '### Preview Deployment';
            const existing = comments.find(c => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
