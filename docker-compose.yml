services:
  postgres:
    image: postgres:18-alpine
    container_name: amazone-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amazone
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d amazone"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: amazone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: amazone-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    logging:
      driver: none

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: amazone-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started

  tempo:
    image: grafana/tempo:2.5.0
    container_name: amazone-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: amazone-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  loki:
    image: grafana/loki:3.1.0
    container_name: amazone-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: amazone-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus
      - loki

  # ---------------------------------------------------------------------------
  # Stripe CLI — forwards webhook events to the local Next.js app.
  # Requires STRIPE_SECRET_KEY in your .env file (sk_test_... or rk_test_...).
  # After starting, the CLI prints a webhook signing secret (whsec_...) to
  # stdout — copy it into STRIPE_WEBHOOK_SECRET in your .env so the app can
  # verify signatures.
  #
  # The forward-to URL uses "host.docker.internal" because the Next.js dev
  # server runs on the host, not inside Docker.
  # ---------------------------------------------------------------------------
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: amazone-stripe-cli
    restart: unless-stopped
    command:
      - listen
      - "--forward-to"
      - "host.docker.internal:3000/api/webhooks/stripe"
      - "--skip-verify"
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set in .env}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "stripe status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Stripe test fixtures (one-shot).
  # Creates products and prices in Stripe's test mode so you have consistent
  # test data after a fresh "stripe fixtures" run.  Place your fixture file at
  # ./stripe/fixtures.json (see Stripe docs for the schema).
  # This service exits after running — it is NOT long-lived.
  # ---------------------------------------------------------------------------
  stripe-fixtures:
    image: stripe/stripe-cli:latest
    container_name: amazone-stripe-fixtures
    restart: "no"
    entrypoint: ["stripe", "fixtures", "/fixtures/fixtures.json"]
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set in .env}
    env_file:
      - .env
    volumes:
      - ./stripe/fixtures.json:/fixtures/fixtures.json:ro
    profiles:
      - seed
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  redis-data:
  tempo-data:
  prometheus-data:
  loki-data:
  grafana-data:
